<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Forms</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body>
    <div class="container">
        <div class="letf-section">
            <div class="image">
                <img src="./image/hill.jpg" alt="Hill-image" />
                <div class="img-info">
                    <h1 id="logo">RK Webs</h1>
                    <a id="back-button" href="./index.html"><i class="fa-solid fa-arrow-left"></i> Back to website </i></a>
                    <p id="image-text">
                        Capturing Moments, <br />
                        Creating Memories
                    </p>
                    <div class="lines">
                        <div id="line-1"></div>
                        <div id="line-2"></div>
                        <div id="line-3"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="right-section">
            <div class="inner-right">

                <h1>Login account</h1>

                <p id="already">Don't have account? <a href="./index.html">Register </a></p>

               

                <div class="input-box">
                    <input type="email" name="email" id="email" placeholder="Email" />
                </div>

                <div class="input-box">
                    <input type="password" name="pass" id="password" placeholder="Password" />
                    <i class="fa-solid fa-eye"></i>
                </div>

                <p id="agree">
                    <input type="checkbox" name="check" id="check" /> I agree to the
                    <a href="#">Terms & Conditions</a>
                </p>

                <button id="create-acc" type="submit">Create Account</button>

                <div class="reg-line">
                    <div class="reg-line-left"></div>
                    <div class="reg-line-text">Or Login with</div>
                    <div class="reg-line-right"></div>
                </div>

                <div class="google-apple">
                    <button>
                        <i class="fa-brands fa-google" style="color: rgba(255, 117, 54, 0.993)"></i>Goggle
                    </button>
                    <button><i class="fa-brands fa-apple"></i>Apple</button>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
